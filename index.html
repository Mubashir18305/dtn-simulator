<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTN SIMULATOR - V2</title>
<link rel="icon" type="image/png" href="isro.png">
<style>


*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#060e14;}
:root{
  --bg:#060e14;--panel:#080f18;--bdr:#0e1e2c;
  --cyan:#00d4ff;--green:#00ff9d;--orange:#ff6b35;
  --yellow:#ffb800;--red:#ff3060;--dim:#1e3a52;--dtxt:#3a6080;
  --text:#a8ccec;
}

#app{display:grid;grid-template-columns:392px 1fr;grid-template-rows:67px 1fr;height:100vh;}

#top{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:#040c14;border-bottom:1px solid var(--bdr);position:relative;}
#top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan) 30%,var(--green) 70%,transparent);opacity:.4;}
.logo{font-family: 'Courier New', Courier, monospace; font-size:16px; font-weight:700; letter-spacing:6px; color:var(--cyan); text-shadow:0 0 20px rgba(0,212,255,.4);}
.logo b{color:var(--green);}
#clk{font-family: 'Courier New', Courier, monospace; font-size:21px; color:var(--green); letter-spacing:4px;}

.hbadges{display:flex;gap:11px;}
.hb{font-family: 'Courier New', Courier, monospace; font-size:13px; letter-spacing:1.4px; padding:3px 11px; border-radius:3px; border:1px solid var(--bdr); color:var(--dtxt); display:flex; align-items:center; gap:6px; transition:all .3s;}
.hled{width:7px;height:7px;border-radius:50%;background:var(--dtxt);}
.hb.alive{color:var(--green);border-color:rgba(0,255,157,.22);}
.hb.alive .hled{background:var(--green);box-shadow:0 0 7px var(--green);animation:lp 2s ease-in-out infinite;}
.hb.tx{color:var(--orange);border-color:rgba(255,107,53,.3);}
.hb.tx .hled{background:var(--orange);box-shadow:0 0 7px var(--orange);animation:lp .4s ease-in-out infinite alternate;}
.hb.wait{color:var(--yellow);border-color:rgba(255,184,0,.25);}
.hb.wait .hled{background:var(--yellow);box-shadow:0 0 7px var(--yellow);}
.hb.rx{color:var(--cyan);border-color:rgba(0,212,255,.25);}
.hb.rx .hled{background:var(--cyan);box-shadow:0 0 7px var(--cyan);}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.2}}

#ctrl{background:var(--panel);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;}
.ph{padding:13px 20px;border-bottom:1px solid var(--bdr);font-family: 'Courier New', Courier, monospace; font-size:13px; font-weight: bold; letter-spacing:4px; color:var(--cyan);}
.pb{padding:17px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:15px;}
.flbl{font-family: 'Courier New', Courier, monospace; font-size:13px; font-weight: bold; letter-spacing:2px; color:var(--dtxt); text-transform:uppercase; margin-bottom:4px;}
.fi{width:100%;padding:8px 13px;background:rgba(0,212,255,.03);border:1px solid var(--bdr);border-radius:3px;color:var(--text);font-family: 'Courier New', Courier, monospace; font-size:17px; outline:none;}
.fi:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(0,212,255,.14);}
textarea.fi{resize:none;height:76px;}

.btn-group { display: flex; gap: 11px; margin-top: 6px; }
.txbtn{flex:2;padding:13px;cursor:pointer;background:linear-gradient(135deg,#002030,#004055);border:1px solid var(--cyan);border-radius:3px;color:var(--cyan);font-family: 'Courier New', Courier, monospace; font-size:15px; font-weight: bold; letter-spacing:3px; transition:all .2s;}
.txbtn:hover{box-shadow:0 0 20px rgba(0,212,255,.2);}
.txbtn:disabled{opacity:.28;cursor:not-allowed;}
.stopbtn{flex:1;padding:13px;cursor:pointer;background:linear-gradient(135deg,#300000,#550000);border:1px solid var(--red);border-radius:3px;color:var(--red);font-family: 'Courier New', Courier, monospace; font-size:15px; font-weight: bold; letter-spacing:3px; transition:all .2s;}
.stopbtn:hover{box-shadow:0 0 20px rgba(255,48,96,.3);}
.stopbtn:disabled{opacity:.28;cursor:not-allowed;}

.clrbtn{width:100%;padding:8px;cursor:pointer;background:transparent;border:1px solid var(--dim);border-radius:3px;color:var(--dtxt);font-family: 'Courier New', Courier, monospace; font-size:13px; font-weight: bold; letter-spacing:3px;}
.clrbtn:hover{border-color:var(--red);color:var(--red);}

#winbar{border-top:1px solid var(--bdr);padding:10px 17px;background:rgba(4,12,20,.9);}
.wrow{display:flex;align-items:center;gap:11px;}
#cdtimer{font-family: 'Courier New', Courier, monospace; font-size:17px; color:var(--yellow); letter-spacing:3px; min-width:126px;}
#cdtimer.open{color:var(--green);text-shadow:0 0 10px rgba(0,255,157,.35);}
#wbtrack{flex:1;height:4px;background:rgba(255,255,255,.04);border-radius:2px;}
#wbfill{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:2px;transition:width .2s linear;}
#wlink{font-family: 'Courier New', Courier, monospace; font-size:13px; font-weight: bold; color:var(--green);}

#right{display:grid;grid-template-rows:1fr 1fr;overflow:hidden;}
#mapwrap{position:relative;overflow:hidden;background:var(--bg);}
#c{position:absolute;inset:0;width:100%;height:100%;}

/* =========================================================
   HUD LOG BAR: ABSOLUTE POSITIONING TO FORCE TOP-RIGHT
   ========================================================= */
#logbar { 
    position: absolute; 
    top: 20px; 
    right: 20px; 
    width: 380px; 
    background: rgba(4, 12, 20, 0.90); 
    border: 1px solid var(--cyan); 
    border-radius: 4px; 
    z-index: 9999; 
    box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
    display: flex;
    flex-direction: column;
}
.log-tabs { display: flex; border-bottom: 1px solid var(--cyan); background: rgba(0,212,255,0.05); border-radius: 4px 4px 0 0; }
.log-tab { flex: 1; padding: 10px 8px; font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: bold; color: var(--dtxt); text-align: center; cursor: pointer; border-right: 1px solid var(--dim); text-transform: uppercase;}
.log-tab:last-child { border-right: none; }
.log-tab.active { color: #fff; background: rgba(0,212,255,0.2); border-bottom: 2px solid var(--cyan);}
#log-content { height: 260px; overflow-y: auto; padding: 13px; font-family: 'Courier New', Courier, monospace; font-size: 14px; color: #6ab0d0; white-space: pre-wrap; line-height: 1.4;}
#log-content::-webkit-scrollbar{width:4px;}
#log-content::-webkit-scrollbar-thumb{background:var(--cyan); border-radius: 2px;}
/* ========================================================= */

.nnode{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;z-index:10;}
.nring{width:81px;height:81px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
.nring::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--dim);opacity:.35;transition:.4s;}
.nnode.wait .nring::before{border-color:var(--yellow);opacity:.8;animation:rs 2s linear infinite;}
.nnode.tx   .nring::before{border-color:var(--orange);opacity:1;animation:rs .8s linear infinite;}
.nnode.rx   .nring::before{border-color:var(--green);opacity:1;animation:rs 1.5s linear infinite;}
.nnode.on   .nring::before{border-color:var(--cyan);opacity:1;animation:rs 3s linear infinite;}
@keyframes rs{to{transform:rotate(360deg)}}
.ncore{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#0d2840,#010710);border:3px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:30px;}
.nnode.on .ncore{border-color:var(--cyan);box-shadow:0 0 28px rgba(0,212,255,.38);}
.nnode.tx .ncore{border-color:var(--orange);box-shadow:0 0 28px rgba(255,107,53,.45);}
.nnode.rx .ncore{border-color:var(--green);box-shadow:0 0 28px rgba(0,255,157,.42);}
.nlbl{margin-top:6px;font-family: 'Courier New', Courier, monospace; font-size:11px; font-weight: bold; letter-spacing:2px; color:var(--dtxt); text-shadow: 0 2px 4px rgba(0,0,0,0.8);}

#term{background:#020a10;border-top:1px solid var(--bdr);overflow:hidden;display:flex;flex-direction:column;}
#termhdr{padding:8px 20px;border-bottom:1px solid var(--bdr);background:#030d16;font-family: 'Courier New', Courier, monospace; font-size:13px; font-weight: bold; letter-spacing:3px; color:var(--cyan); display:flex; justify-content:space-between; align-items:center;}
#termout{flex:1;overflow-y:auto;padding:14px 20px;font-family: 'Courier New', Courier, monospace; font-size:17.5px; line-height:1.65; color:#6ab0d0;}
#termout::-webkit-scrollbar{width:3px;}
#termout::-webkit-scrollbar-thumb{background:var(--dim);}

.t-def{color:#6ab0d0;}
.t-hdr{color:var(--cyan); font-weight:bold;}
.t-win{color:var(--yellow);}
.t-fov{color:#a78bfa;}
.t-aos{color:var(--green); font-weight:bold;}
.t-send{color:var(--orange);}
.t-tat{color:var(--green);}
.t-err{color:var(--red); font-weight:bold;}
.t-sep{color:#1e3a52;}
.t-success{color:var(--green); font-weight:bold;}
</style>
</head>
<body>
<div id="app">

<div id="top">
  <div style="display: flex; align-items: center; gap: 15px;">
    <img src="isro.png" alt="ISRO" style="height: 45px; width: auto; color: var(--cyan); font-family: monospace;">
    <div class="logo">DTN&#183;<b>SIM</b></div>
  </div>
  <div class="hbadges">
    <div class="hb alive" id="hgs"><div class="hled"></div>GS</div>
    <div class="hb" id="hsa"><div class="hled"></div>SAT_A</div>
    <div class="hb" id="hsb"><div class="hled"></div>SAT_B</div>
    <div class="hb" id="hsc"><div class="hled"></div>SAT_C</div>
  </div>
  <div id="clk">00:00:00:000</div>
</div>

<div id="ctrl">
  <div class="ph">&#9651; MISSION CONTROL</div>
  <div class="pb">
    <div>
      <div class="flbl">DESTINATION NODE</div>
      <select class="fi" id="dest">
        <option value="sat_a">sat_a</option>
        <option value="sat_b">sat_b</option>
        <option value="sat_c" selected>sat_c</option>
      </select>
    </div>
    <div>
      <div class="flbl">ROUTING PATH</div>
      <input class="fi" id="ri" value="sat_b,sat_c">
    </div>
    <div>
      <div class="flbl">PAYLOAD</div>
      <textarea class="fi" id="payload">Interactive DTN simulation test.</textarea>
    </div>
    <div>
      <div class="flbl">TOTAL MESSAGE SIZE (BYTES)</div>
      <input class="fi" id="msz" type="number" value="120">
    </div>
    <div>
      <div class="flbl">LINK BANDWIDTH (BPS)</div>
      <input class="fi" id="bps" type="number" value="14400">
    </div>
    <div>
      <div class="flbl">TRANSMISSION START TIME</div>
      <input class="fi" id="starttime" placeholder="e.g. 14:30:00:00" value="">
    </div>
    <div class="btn-group">
      <button class="txbtn" id="txbtn" onclick="handleLaunch()">&#9654; TRANSMIT</button>
      <button class="stopbtn" id="stopbtn" onclick="handleStop()" disabled>&#9209; STOP</button>
    </div>
    <button class="clrbtn" onclick="clearTerm()">&#10005; CLEAR TERMINAL</button>
  </div>
  
  <div id="winbar">
    <div class="wrow">
      <div id="cdtimer">--:--:--</div>
      <div id="wbtrack"><div id="wbfill"></div></div>
      <div id="wlink">NO LINK</div>
    </div>
  </div>
</div>

<div id="right">
  
  <div id="mapwrap">
    <canvas id="c"></canvas>
    
    <div id="logbar">
      <div class="log-tabs">
          <div class="log-tab active" onclick="switchTab('gs', this)">gs.txt</div>
          <div class="log-tab" onclick="switchTab('a', this)">a.txt</div>
          <div class="log-tab" onclick="switchTab('b', this)">b.txt</div>
          <div class="log-tab" onclick="switchTab('c', this)">c.txt</div>
      </div>
      <div id="log-content">AWAITING TELEMETRY (HUD ACTIVE)...</div>
    </div>

    <div class="nnode on" id="n-gs"><div class="nring"><div class="ncore">&#127758;</div></div><div class="nlbl">gs</div></div>
    <div class="nnode"    id="n-sat_a"><div class="nring"><div class="ncore">&#128752;</div></div><div class="nlbl">sat_a</div></div>
    <div class="nnode"    id="n-sat_b"><div class="nring"><div class="ncore">&#128752;</div></div><div class="nlbl">sat_b</div></div>
    <div class="nnode"    id="n-sat_c"><div class="nring"><div class="ncore">&#128752;</div></div><div class="nlbl">sat_c</div></div>
  </div>
  
  <div id="term">
    <div id="termhdr">
      <span>&#9632; TERMINAL OUTPUT</span>
      <span id="termstatus" style="color:var(--green);">IDLE</span>
    </div>
    <div id="termout"></div>
  </div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
let running = false;
let activeTab = 'gs';
let uiTimerInt = null;

setInterval(()=>{
  const d=new Date();
  document.getElementById('clk').textContent=
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+
    String(d.getSeconds()).padStart(2,'0')+':'+String(d.getMilliseconds()).padStart(3,'0');
},50);

const to = document.getElementById('termout');
function T(cls,txt){
  const d=document.createElement('div');
  d.className=cls; d.textContent=txt;
  to.appendChild(d); to.scrollTop=to.scrollHeight;
}


let socket = null;
try { socket = io(); } 
catch(e) { console.warn("Socket.io not found."); }

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let beams=[];
function nPos(id){
  const el=document.getElementById('n-'+id); if(!el)return null;
  const wr=document.getElementById('mapwrap').getBoundingClientRect();
  const er=el.getBoundingClientRect();
  return{x:er.left+er.width/2-wr.left, y:er.top+er.height/2-wr.top};
}
function rz(){
  const wr=document.getElementById('mapwrap'); if(!wr) return; 
  cv.width=wr.clientWidth; cv.height=wr.clientHeight;
  const cx=cv.width/2,cy=cv.height/2;
  const p={gs:{x:cx,y:cy},sat_a:{x:cx,y:cy-160},sat_b:{x:cx+185,y:cy+90},sat_c:{x:cx-185,y:cy+90}};
  for(const[id,v]of Object.entries(p)){
    const e=document.getElementById('n-'+id);
    if(e){e.style.left=v.x+'px';e.style.top=v.y+'px';}
  }
}
window.addEventListener('resize',rz); window.onload = rz;

function drawFrame(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const ns=['gs','sat_a','sat_b','sat_c'];
  ctx.setLineDash([2,6]);
  for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){
    const a=nPos(ns[i]),b=nPos(ns[j]); if(!a||!b)continue;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle='rgba(10,28,44,.65)';ctx.lineWidth=1;ctx.stroke();
  }
  ctx.setLineDash([]);
  const now=performance.now();
  beams=beams.filter(b=>now-b.startT<b.dur);
  for(const bm of beams){
    const a=nPos(bm.from),b=nPos(bm.to); if(!a||!b)continue;
    const t=(now-bm.startT)/bm.dur;
    const px=a.x+(b.x-a.x)*t, py=a.y+(b.y-a.y)*t;
    const tr=ctx.createLinearGradient(a.x,a.y,px,py);
    tr.addColorStop(0,'transparent');
    tr.addColorStop(Math.max(0,1-.4/Math.max(t,.001)),'transparent');
    tr.addColorStop(1,bm.color);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(px,py);
    ctx.strokeStyle=tr;ctx.lineWidth=3;ctx.stroke();
    ctx.beginPath();ctx.arc(px,py,8,0,Math.PI*2);
    ctx.fillStyle=bm.color;ctx.shadowColor=bm.color;ctx.shadowBlur=20;ctx.fill();ctx.shadowBlur=0;
  }
  requestAnimationFrame(drawFrame);
}
requestAnimationFrame(drawFrame);

function fireBeam(from, to, color) {
    beams.push({from, to, color, startT: performance.now(), dur: 400});
}

function setNode(id,cls){
  const el=document.getElementById('n-'+id);
  if(el) el.className='nnode'+(cls?' '+cls:'');
  const h=document.getElementById('h'+id.replace('sat_','s'));
  if(h) h.className='hb'+(cls?' '+cls:(id==='gs'?' alive':''));
}

function startWinUI(linkName, waitMs) {
    if(uiTimerInt) clearInterval(uiTimerInt);
    const cd = document.getElementById('cdtimer');
    const fill = document.getElementById('wbfill');
    document.getElementById('wlink').textContent = linkName.toUpperCase();
    
    const startT = Date.now();
    const endT = startT + waitMs;

    uiTimerInt = setInterval(() => {
        if(!running) { clearInterval(uiTimerInt); return; }
        let rem = endT - Date.now();
        if(rem <= 0) {
            clearInterval(uiTimerInt);
            cd.textContent = '00:00:000';
            fill.style.width = '100%';
        } else {
            cd.className = '';
            cd.textContent = String(Math.floor(rem/60000)).padStart(2,'0')+':'+String(Math.floor((rem%60000)/1000)).padStart(2,'0')+':'+String(rem%1000).padStart(3,'0');
            fill.style.width = Math.min(100, ((waitMs - rem)/waitMs)*100) + '%';
        }
    }, 50);
}

function openWinUI() {
    if(uiTimerInt) clearInterval(uiTimerInt);
    const cd = document.getElementById('cdtimer');
    const fill = document.getElementById('wbfill');
    cd.className = 'open';
    cd.textContent = 'WINDOW OPEN';
    fill.style.width = '100%';
}

if(socket) {
    socket.on('engine_log', (data) => {
        let msg = data.msg.trim();
        if (!msg) return;

        let cls = 't-def';
        
        if (msg.includes('WAITING') || msg.includes('window is currently') || msg.includes('MISSED')) cls = 't-win';
        else if (msg.includes('AOS Established')) cls = 't-aos';
        else if (msg.includes('FOV Achieved') || msg.includes('LOS Confirmed')) cls = 't-fov';
        else if (msg.includes('> Data beamed to')) cls = 't-send';
        else if (msg.includes('CYCLE COMPLETE') || msg.includes('FINAL DELIVERY')) cls = 't-success';
        else if (msg.includes('Turn Around Time') || msg.includes('Queue Time') || msg.includes('Nodes Queued') || msg.includes('Avg Queue')) cls = 't-tat';
        else if (msg.includes('ERROR')) cls = 't-err';
        else if (msg.includes('===') || msg.includes('---')) cls = 't-sep';

        T(cls, `[${data.node.toUpperCase()}] ${msg}`);

        if (msg.includes('[WAITING]')) {
            let parts = msg.split('|');
            if (parts.length >= 3) {
                let link = parts[0].replace('[WAITING]', '').trim();
                let waitStr = parts[2].replace('Wait:', '').replace('sec', '').trim();
                startWinUI(link, parseFloat(waitStr) * 1000);
            }
        } 
        else if (msg.includes('AOS Established') || msg.includes('[ACTIVE]')) {
            openWinUI();
        }
        else if (msg.includes('> Data beamed to')) {
            const toNode = msg.split('to ')[1].split(' ')[0].replace(/[()]/g, '').trim(); 
            fireBeam(data.node, toNode, data.node === 'gs' ? '#00d4ff' : '#ff6b35');
            
            setNode(data.node, 'tx');
            setNode(toNode, 'rx'); 
            
            setTimeout(() => { 
                setNode(data.node, ''); 
                setNode(toNode, ''); 
            }, 400);
        }
        else if (msg.includes('CYCLE COMPLETE')) {
            running = false;
            document.getElementById('txbtn').disabled = false;
            document.getElementById('stopbtn').disabled = true;
            setTimeout(() => { socket.emit('kill'); }, 1000);
        }
    });
}

function handleLaunch() {
    running = true;
    document.getElementById('txbtn').disabled = true;
    document.getElementById('stopbtn').disabled = false;
    to.innerHTML = '';
    
    socket.emit('start_simulation', {
        dest: document.getElementById('dest').value,
        route: document.getElementById('ri').value,
        size: document.getElementById('msz').value,
        payload: document.getElementById('payload').value,
        bps: document.getElementById('bps').value,
        time: document.getElementById('starttime').value || "00:00:00:00"
    });
}

function handleStop() {
    socket.emit('kill');
    document.getElementById('txbtn').disabled = false;
    document.getElementById('stopbtn').disabled = true;
    T('t-err', '\n[SYSTEM] SEQUENCE ABORTED BY OPERATOR\n');
    running = false;
}

function clearTerm() { to.innerHTML = ''; }

function switchTab(node, element) {
    activeTab = node;
    document.querySelectorAll('.log-tab').forEach(t => t.classList.remove('active'));
    element.classList.add('active');
}

setInterval(() => {
    fetch(`/${activeTab}.txt?t=${Date.now()}`)
        .then(r => r.ok ? r.text() : "")
        .then(text => {
            if(text.includes('<!DOCTYPE') || text.includes('<html')) return;
            document.getElementById('log-content').textContent = text || "AWAITING TELEMETRY (HUD ACTIVE)...";
        })
        .catch(e=>{});
}, 1000);
</script>
</body>
</html>
